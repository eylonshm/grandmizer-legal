<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>גרנדמייזר - מסמכים משפטיים</title>
<style>
  :root { --brand:#7cb518; --ink:#222; --muted:#666; }
  * { box-sizing:border-box; }
  body { font-family:-apple-system,"Segoe UI",Arial,"Arial Hebrew",sans-serif; line-height:1.7; color:var(--ink);
         max-width:760px; margin:0 auto; padding:48px 20px; background:#fff; text-align:center; }
  h1 { color:var(--brand); font-size:2rem; margin-bottom:8px; }
  .subtitle { color:var(--muted); margin-bottom:40px; }
  .links { display:flex; flex-direction:column; align-items:center; gap:16px; }
  .link-card { display:block; width:100%; max-width:400px; padding:20px 24px; border:2px solid var(--brand);
               border-radius:12px; text-decoration:none; color:var(--brand); font-size:1.15rem; font-weight:600;
               transition:background 0.15s, color 0.15s; }
  .link-card:hover { background:var(--brand); color:#fff; }
  footer { margin-top:60px; color:var(--muted); font-size:.85rem; border-top:1px solid #eee; padding-top:16px; }
</style>
</head>
<body>
<h1>גרנדמייזר</h1>
<p class="subtitle">מסמכים משפטיים</p>
<div class="links">
  <a class="link-card" href="privacy.html">מדיניות פרטיות</a>
  <a class="link-card" href="terms.html">תנאי שימוש</a>
</div>
<footer>Tea Labs</footer>
</body>
</html>
